name: ci
on:
  push:
    branches: 
    - main
    - 'phase-1/week-1/day-5-docker' # Thêm nhánh này vào danh sách trigger
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './day-5-docker/app/package-lock.json' # Thêm dòng này vào cả 2 job lint và test
      - run: npm ci
        working-directory: ./day-5-docker/app
      - run: npm run lint
        working-directory: ./day-5-docker/app

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './day-5-docker/app/package-lock.json' # Thêm dòng này vào cả 2 job lint và test
      - run: npm ci
        working-directory: ./day-5-docker/app
      - run: npm test
        working-directory: ./day-5-docker/app

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      # Step phụ: Tự động chuyển tên owner thành viết thường và lưu vào outputs
      - name: Open case-insensitive repository owner
        id: repo_owner
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - uses: docker/build-push-action@v6
        with:
          context: ./day-5-docker
          file: ./day-5-docker/Dockerfile
          push: true
          # Gọi lại giá trị đã được viết thường từ outputs của step trên
          tags: |
            ghcr.io/${{ steps.repo_owner.outputs.owner }}/demo-app:sha-${{ github.sha }}
            ghcr.io/${{ steps.repo_owner.outputs.owner }}/demo-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # 1. Thêm step trivy scan image, fail nếu có CVE HIGH hoặc CRITICAL
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ steps.repo_owner.outputs.owner }}/demo-app:sha-${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Trả về code 1 để làm FAIL pipeline nếu tìm thấy lỗ hổng
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL' # Chỉ quét và chặn các lỗi ở mức HIGH và CRITICAL

      # 2. Thêm step tạo và upload SBOM dùng syft
      - name: Generate SBOM using Syft
        uses: anchore/sbom-action@v0
        with:
          image: 'ghcr.io/${{ steps.repo_owner.outputs.owner }}/demo-app:sha-${{ github.sha }}'
          artifact-name: sbom.spdx.json # Tên file định dạng SBOM để lưu trữ
          output-file: ./sbom.spdx.json