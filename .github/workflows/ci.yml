name: ci
on:
  push:
    branches: 
    - main
    - 'phase-1/week-1/day-5-docker' # Thêm nhánh này vào danh sách trigger
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run lint

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    # Bỏ điều kiện lọc nhánh main đi để nhánh nào push lên cũng được build
    if: github.event_name == 'push' 
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./day-5-docker          # Sửa lại đường dẫn này cho đúng vị trí Dockerfile
          file: ./day-5-docker/Dockerfile  # Chỉ định rõ file Dockerfile nằm ở đâu
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/demo-app:sha-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/demo-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max