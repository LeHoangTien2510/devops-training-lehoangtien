global:
  scrape_interval: 15s

scrape_configs:
  # Cào Node Exporter mỗi 15 giây
  - job_name: 'node-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['node-exporter:9100']

  # Cào Blackbox Exporter probe https://example.com mỗi 30 giây
  - job_name: 'blackbox-external-website'
    metrics_path: /probe
    params:
      module: [http_2xx]
    scrape_interval: 30s
    static_configs:
      - targets:
          - https://example.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115