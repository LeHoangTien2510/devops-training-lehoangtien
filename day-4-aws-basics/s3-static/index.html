<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - S3 Static Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9ecefa);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 1.1em; }
        .success-icon { font-size: 48px; color: #2ecc71; }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">🚀</div>
        <h1>Chúc mừng bạn!</h1>
        <p>Website tĩnh của bạn đang chạy hoàn hảo trên Amazon S3.</p>
    </div>
</body>
</html>
