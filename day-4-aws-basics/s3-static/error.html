<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lỗi 404 - Không Tìm Thấy Trang</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 500px;
            padding: 30px;
        }
        h1 { font-size: 6rem; margin: 0; color: #e74c3c; }
        h2 { color: #2c3e50; margin-top: 0; }
        p { color: #95a5a6; font-size: 1.1em; line-height: 1.6; }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.2s;
        }
        a:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Không Tìm Thấy Trang</h2>
        <p>Đường dẫn bạn vừa truy cập không tồn tại hoặc đã bị di chuyển sang vị trí khác.</p>
        <a href="/">Quay lại Trang Chủ</a>
    </div>
</body>
</html>
